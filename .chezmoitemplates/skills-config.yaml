# Skills configuration
# Canonical skills live in ~/.claude/skills/ (also accessible as ~/.agents/skills via symlink)
#
# Tool skill paths:
#   Claude Code  -> ~/.claude/skills/        (canonical, reads all)
#   Goose        -> ~/.agents/skills/         (hardcoded, reads all via symlink)
#   Opencode     -> ~/.agents/skills/         (configured in opencode.json)
#   Crush        -> ~/.agents/skills/         (configured in crush.json skills_paths)
#   Pi           -> ~/.agents/skills/         (configured in settings.json)
#   Codex        -> ~/.codex/skills/          (hardcoded, maintained via sync script)
#
# Adding a new skill: drop it in ~/.claude/skills/ and run chezmoi apply.
# All tools except Codex pick it up automatically. Codex gets it via the sync script.
